<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GhostSpeed — Type Like a Ghost</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d10;
    --surface: #141418;
    --border: #ffffff0d;
    --border2: #ffffff12;
    --purple: #9b7fe8;
    --purple-dim: #6b52b0;
    --purple-glow: #9b7fe818;
    --text: #e8e8f0;
    --text-dim: #4a4a60;
    --text-mid: #6a6a80;
    --untyped: #2e2e3c;
    --typed-ok: #888899;
    --typed-err: #e87e7e;
    --cursor-c: #9b7fe8;
    --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HEADER ─── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 22px 40px;
    display: flex;
    align-items: center;
    transition: opacity var(--tr), transform var(--tr);
  }
  #header.hidden { opacity:0; transform:translateY(-10px); pointer-events:none; }

  .logo {
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    cursor: pointer;
    user-select: none;
  }
  .logo span { color: var(--purple); }

  /* ─── MAIN ─── */
  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  #typing-container {
    width: min(960px, calc(100vw - 80px));
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ─── CONTROLS ─── */
  #top-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    transition: opacity var(--tr);
  }
  #top-controls.hidden { opacity:0; pointer-events:none; }

  .bc-pill {
    display: flex;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 5px;
  }

  .bc-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: 'Syne', sans-serif;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 4px 12px;
    border-radius: 14px;
    cursor: pointer;
    transition: color 0.18s, background 0.18s;
    text-transform: lowercase;
    white-space: nowrap;
  }
  .bc-btn:hover { color: var(--text-mid); }
  .bc-btn.active { color: var(--purple); background: var(--purple-glow); }

  /* ─── INFO BAR ─── */
  #info-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 7px 18px;
    margin-bottom: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    white-space: nowrap;
  }
  #info-bar.visible { opacity:1; pointer-events:all; }
  #info-bar.focus-hidden { opacity:0 !important; pointer-events:none !important; }

  .info-item { display:flex; align-items:center; gap:6px; }
  .info-label { font-size:0.57rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-dim); }
  .info-val { font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--purple); }
  .info-val.new-rec { color:#f0c060; }
  .info-sub { font-size:0.57rem; color:var(--text-dim); }
  .info-div { width:1px; height:14px; background:var(--border2); }

  /* ─── WORD DISPLAY: natural wrap ─── */
  #word-display {
    position: relative;
    overflow: hidden;
    width: 100%;
    /* show exactly 3 rows */
    height: calc(1.5rem * 1.45 * 3 + 14px * 2);
    mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
    transition: opacity 0.4s ease;
  }
  #word-display.fade-out { opacity:0; }

  /* all words in one continuous flex container */
  #words-wrap {
    position: absolute;
    width: 100%;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 0;
    /* vertical slide for row reveal */
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .word {
    display: inline-flex;
    position: relative;
    padding: 2px 0;
    margin-right: 12px;
    margin-bottom: 14px;
  }

  .word.wrong-word::after {
    content: '';
    position: absolute;
    bottom: 0; left:0; right:0;
    height: 2px;
    background: var(--typed-err);
    border-radius: 1px;
    opacity: 0.4;
  }

  .letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--untyped);
    transition: color 0.04s ease;
    line-height: 1.45;
    will-change: color;
  }
  .letter.correct { color: var(--typed-ok); }
  .letter.wrong   { color: var(--typed-err); }

  /* ─── CURSOR ─── */
  .cursor-char { position: relative; }
  .cursor-char::before {
    content: '';
    position: absolute;
    left: -2px; top:5px; bottom:5px;
    width: 2px;
    background: var(--cursor-c);
    border-radius: 1px;
    animation: blink 1.1s ease-in-out infinite;
    box-shadow: 0 0 6px var(--cursor-c);
  }
  @keyframes blink {
    0%,45%  { opacity:1; }
    55%,100%{ opacity:0; }
  }

  #hidden-input { position:absolute; opacity:0; pointer-events:none; width:1px; height:1px; }

  /* ─── BOTTOM AREA ─── */
  #bottom-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    width: 100%;
  }

  #timer-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity var(--tr);
    min-height: 1.5rem;
    display: flex;
    align-items: center;
  }
  #timer-display.visible { opacity:1; }
  #timer-display.big { font-size:2.2rem; color:var(--purple); font-weight:300; }

  #start-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.67rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    opacity: 1;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #start-hint .key {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 5px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.64rem;
    color: var(--text-mid);
  }
  #start-hint.hidden { opacity:0; pointer-events:none; }

  #esc-hint {
    font-size: 0.57rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--tr);
  }
  #esc-hint.visible { opacity:1; pointer-events:all; }

  .key-small {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.55rem;
    color: var(--text-dim);
  }

  /* ─── BEST RECORD BAR (fixed bottom center) ─── */
  #best-record-bar {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    white-space: nowrap;
  }
  #best-record-bar.visible { opacity:1; }
  #best-record-bar.focus-hidden { opacity:0 !important; }

  .best-label { font-size:0.57rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); }
  .best-wpm { font-family:'JetBrains Mono',monospace; font-size:1rem; color:var(--purple); font-weight:400; }
  .best-sub { font-size:0.6rem; color:var(--text-dim); margin-left:-4px; }
  .best-div { width:1px; height:14px; background:var(--border2); }

  @media (max-width:600px) {
    #header { padding:14px 18px; }
    #typing-container { width: calc(100vw - 32px); }
    .letter { font-size:1.15rem; }
    .bc-btn { padding:4px 8px; font-size:0.66rem; }
  }
</style>
</head>
<body>

<header id="header">
  <div class="logo" id="logo-btn">Ghost<span>Speed</span></div>
</header>

<div id="app">
  <div id="typing-container">

    <div id="top-controls">
      <div class="bc-pill" id="lang-pill">
        <button class="bc-btn active" data-lang="id">indonesia</button>
        <button class="bc-btn" data-lang="en">english</button>
      </div>
      <div class="bc-pill" id="time-pill">
        <button class="bc-btn active" data-sec="30">30d</button>
        <button class="bc-btn" data-sec="60">60d</button>
      </div>
    </div>

    <div id="info-bar"></div>

    <div id="word-display">
      <div id="words-wrap"></div>
    </div>
    <input id="hidden-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" aria-hidden="true" tabindex="-1">

    <div id="bottom-area">
      <div id="timer-display"></div>
      <div id="start-hint">
        <span>mulai mengetik</span>
        <span>·</span>
        <span class="key">Tab</span>
        <span>restart</span>
      </div>
      <div id="esc-hint">
        <span class="key-small">ESC</span>
        <span>keluar</span>
      </div>
    </div>

  </div>
</div>

<div id="best-record-bar">
  <div class="best-label">Rekor Terbaik</div>
  <div class="best-wpm" id="best-wpm-val">—</div>
  <div class="best-sub">wpm</div>
  <div class="best-div"></div>
  <div class="best-label">Akurasi</div>
  <div class="best-wpm" id="best-acc-val">—</div>
</div>

<script>
const WORDS = {
  id: [
    "aku","kamu","dia","kami","kita","mereka","ini","itu","dan","atau",
    "tidak","bukan","ada","akan","bisa","harus","mau","boleh","dari","ke",
    "di","pada","dengan","untuk","tentang","karena","jika","kalau","tapi","namun",
    "juga","sudah","belum","lagi","masih","sangat","lebih","paling","sekali","selalu",
    "sering","kadang","jarang","baru","lama","cepat","lambat","besar","kecil","tinggi",
    "rendah","panjang","pendek","bagus","jelek","baik","buruk","senang","sedih","takut",
    "marah","heran","pikir","rasa","tahu","kenal","lihat","dengar","bicara","tanya",
    "jawab","kerja","belajar","makan","minum","tidur","jalan","lari","baca","tulis",
    "bantu","kasih","beri","ambil","pergi","datang","pulang","mulai","selesai","buat",
    "pakai","bayar","beli","jual","cari","temukan","hubungan","keluarga","teman","orang",
    "hari","waktu","tempat","rumah","sekolah","kantor","kota","negara","dunia","kata",
    "cerita","berita","buku","meja","kursi","pintu","langit","air","api","angin",
    "hujan","matahari","bulan","bintang","pohon","bunga","hidup","cinta","harap","mimpi"
  ],
  en: [
    "the","be","to","of","and","a","in","that","have","it",
    "for","not","on","with","he","as","you","do","at","this",
    "but","his","by","from","they","we","say","her","she","or",
    "an","will","my","one","all","would","there","their","what","so",
    "up","out","if","about","who","get","which","go","me","when",
    "make","can","like","time","no","just","him","know","take","people",
    "into","year","your","good","some","could","them","see","other","than",
    "then","now","look","only","come","its","over","think","also","back",
    "after","use","two","how","our","work","first","well","way","even",
    "new","want","because","any","these","give","day","most","us","great",
    "between","need","large","often","hand","high","place","hold","turn","was",
    "said","each","tell","does","set","three","small","end","put","home",
    "read","spell","land","must","big","such","follow","act","why","ask",
    "change","light","kind","off","play","air","away","animal","house","point"
  ]
};

let state = {
  lang:'id', seconds:30,
  words:[], wordEls:[], letterSpans:[], wordStartIndex:[],
  cursorIndex:0, wordIndex:0, typed:'',
  status:'idle',
  correctChars:0, wrongChars:0,
  startTime:null, timerInterval:null,
  timeLeft:30,
  bestRecords:{},
  lastResult:null,
  // row-tracking for scroll
  rowHeight: 0,
  wordRowMap: []
};

const $=id=>document.getElementById(id);
const $header  = $('header');
const $wrap    = $('words-wrap');
const $wordDisp= $('word-display');
const $input   = $('hidden-input');
const $hint    = $('start-hint');
const $topCtrl = $('top-controls');
const $infoBar = $('info-bar');
const $esc     = $('esc-hint');
const $timerEl = $('timer-display');
const $bestBar = $('best-record-bar');

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function genWords(n){
  const pool=shuffle(WORDS[state.lang]);const r=[];
  while(r.length<n)r.push(...pool);
  return r.slice(0,n);
}
function calcWpm(){
  if(!state.startTime)return 0;
  const m=(Date.now()-state.startTime)/60000;
  return Math.round((state.correctChars/5)/m)||0;
}
function calcAcc(){
  const t=state.correctChars+state.wrongChars;
  return t?Math.round(state.correctChars/t*100):100;
}
function recKey(){return `${state.lang}_${state.seconds}`;}

function buildDisplay(){
  $wrap.innerHTML='';
  $wrap.style.transform='translateY(0)';
  state.letterSpans=[];
  state.wordStartIndex=[];
  state.wordEls=[];
  let g=0;

  state.words.forEach((word,wi)=>{
    const wordEl=document.createElement('div');
    wordEl.className='word';
    wordEl.id=`w-${wi}`;
    state.wordStartIndex[wi]=g;
    [...word].forEach(ch=>{
      const sp=document.createElement('span');
      sp.className='letter'+(g===0?' cursor-char':'');
      sp.textContent=ch;
      state.letterSpans[g]=sp;
      wordEl.appendChild(sp);
      g++;
    });
    $wrap.appendChild(wordEl);
    state.wordEls[wi]=wordEl;
  });

  state.cursorIndex=0;
  state.wordIndex=0;

  // measure row height after render
  requestAnimationFrame(()=>{
    if(state.wordEls[0]){
      state.rowHeight=state.wordEls[0].offsetHeight + 14; // height + margin-bottom
    }
    buildWordRowMap();
  });
}

function buildWordRowMap(){
  // map each word to its row index based on offsetTop
  state.wordRowMap=[];
  const base=state.wordEls[0]?state.wordEls[0].offsetTop:0;
  state.wordEls.forEach((el,i)=>{
    if(el) state.wordRowMap[i]=Math.round((el.offsetTop-base)/state.rowHeight);
  });
}

function scrollToWord(wi){
  if(!state.wordEls[wi]) return;
  const base=state.wordEls[0]?state.wordEls[0].offsetTop:0;
  const top=state.wordEls[wi].offsetTop-base;
  // keep current word on row 1 (second row), so row 0 is visible above for context
  const targetRow=state.wordRowMap[wi]||0;
  const scrollY=targetRow>0 ? (targetRow-0)*state.rowHeight : 0;
  $wrap.style.transform=`translateY(-${scrollY}px)`;
}

function moveCursor(from,to){
  if(state.letterSpans[from]) state.letterSpans[from].classList.remove('cursor-char');
  if(state.letterSpans[to])   state.letterSpans[to].classList.add('cursor-char');
}

function setTimer(val,big=false){
  $timerEl.textContent=val||'';
  $timerEl.classList.toggle('big',big);
  $timerEl.classList.toggle('visible',!!val);
}

function renderInfoBar(){
  const last=state.lastResult;
  if(!last){$infoBar.classList.remove('visible');$infoBar.innerHTML='';return;}
  const key=recKey();
  const rec=state.bestRecords[key];
  const isNew=rec&&last.wpm>=rec.wpm;
  let html=`
    <div class="info-item">
      <div class="info-label">Terakhir</div>
      <div class="info-val${isNew?' new-rec':''}">${last.wpm}</div>
      <div class="info-sub">wpm</div>
    </div>
    <div class="info-div"></div>
    <div class="info-item">
      <div class="info-label">Akurasi</div>
      <div class="info-val${isNew?' new-rec':''}">${last.acc}%</div>
    </div>
  `;
  if(isNew) html+=`<div class="info-div"></div><div class="info-item"><div class="info-val new-rec" style="font-size:0.72rem">🏆 rekor baru</div></div>`;
  $infoBar.innerHTML=html;
  $infoBar.classList.add('visible');
}

function renderBestBar(){
  const key=recKey(),rec=state.bestRecords[key];
  if(rec){
    $('best-wpm-val').textContent=rec.wpm;
    $('best-acc-val').textContent=rec.acc+'%';
    $bestBar.classList.add('visible');
  } else {
    $bestBar.classList.remove('visible');
  }
}

function init(){
  state.words=genWords(150);
  state.typed='';state.wordIndex=0;state.cursorIndex=0;
  state.correctChars=0;state.wrongChars=0;
  state.startTime=null;state.status='idle';
  state.timeLeft=state.seconds;
  clearInterval(state.timerInterval);
  $wordDisp.classList.remove('fade-out');
  buildDisplay();
  exitFocus();
  renderInfoBar();
  renderBestBar();
  $hint.classList.remove('hidden');
  $input.value='';
  setTimer('');
}

function enterFocus(){
  $header.classList.add('hidden');
  $esc.classList.add('visible');
  $topCtrl.classList.add('hidden');
  $hint.classList.add('hidden');
  $infoBar.classList.add('focus-hidden');
  $bestBar.classList.add('focus-hidden');
  setTimer(state.seconds,true);
}

function exitFocus(){
  $header.classList.remove('hidden');
  $esc.classList.remove('visible');
  $topCtrl.classList.remove('hidden');
  $infoBar.classList.remove('focus-hidden');
  $bestBar.classList.remove('focus-hidden');
  setTimer('');
}

function startTyping(){
  state.status='typing';
  state.startTime=Date.now();
  enterFocus();
  state.timeLeft=state.seconds;
  state.timerInterval=setInterval(()=>{
    state.timeLeft--;
    setTimer(state.timeLeft,true);
    if(state.timeLeft<=0){clearInterval(state.timerInterval);endGame();}
  },1000);
}

$input.addEventListener('keydown',e=>{
  if(state.status==='done')return;
  if(e.key==='Escape'){if(state.status==='typing')endGame();else exitFocus();return;}
  if(e.key==='Tab'){e.preventDefault();init();return;}
  if(e.key==='Backspace'&&state.status==='typing'){e.preventDefault();doBackspace();return;}
  if(state.status==='idle'&&e.key.length===1&&e.key!==' ')startTyping();
});

$input.addEventListener('input',e=>{
  if(state.status==='idle'){
    if($input.value.trim()===''){$input.value='';return;}
    startTyping();
  }
  if(state.status!=='typing')return;
  const val=$input.value;
  if(val.slice(-1)===' '){
    if(state.typed.trim()===''){$input.value='';return;}
    $input.value='';
    advanceWord();
    return;
  }
  state.typed=val;
  applyTyped();
});

function applyTyped(){
  const ws=state.wordStartIndex[state.wordIndex];
  const word=state.words[state.wordIndex];
  for(let i=0;i<word.length;i++){
    const sp=state.letterSpans[ws+i];
    if(!sp)continue;
    if(i<state.typed.length){
      sp.className='letter '+(state.typed[i]===word[i]?'correct':'wrong');
    } else {
      sp.className='letter';
    }
  }
  const nc=ws+Math.min(state.typed.length,word.length);
  moveCursor(state.cursorIndex,nc);
  state.cursorIndex=nc;
}

function doBackspace(){
  if(state.typed.length===0)return;
  state.typed=state.typed.slice(0,-1);
  $input.value=state.typed;
  applyTyped();
}

function advanceWord(){
  const word=state.words[state.wordIndex];
  let c=0,w=0;
  for(let i=0;i<Math.max(word.length,state.typed.length);i++){
    if(i<word.length&&i<state.typed.length)state.typed[i]===word[i]?c++:w++;
    else w++;
  }
  state.correctChars+=c;state.wrongChars+=w;
  if(w>0){const el=$(`w-${state.wordIndex}`);if(el)el.classList.add('wrong-word');}
  state.wordIndex++;
  state.typed='';
  if(state.wordIndex<state.words.length){
    const ns=state.wordStartIndex[state.wordIndex];
    moveCursor(state.cursorIndex,ns);
    state.cursorIndex=ns;
    // scroll: keep current word on row 1
    scrollToWord(state.wordIndex);
  }
}

function endGame(){
  state.status='done';
  clearInterval(state.timerInterval);
  const wpm=calcWpm(),acc=calcAcc(),key=recKey();
  state.lastResult={wpm,acc};
  if(!state.bestRecords[key]||wpm>state.bestRecords[key].wpm){
    state.bestRecords[key]={wpm,acc};
    try{localStorage.setItem('gs_rec',JSON.stringify(state.bestRecords));}catch(e){}
  }
  $wordDisp.classList.add('fade-out');
  setTimeout(()=>{
    exitFocus();
    renderInfoBar();
    renderBestBar();
    $hint.classList.add('hidden');
    setTimer('');
    setTimeout(init,2000);
  },350);
}

$('logo-btn').addEventListener('click',init);
document.getElementById('typing-container').addEventListener('click',()=>$input.focus());
document.addEventListener('keydown',e=>{
  if(!e.ctrlKey&&!e.metaKey&&!e.altKey)$input.focus();
});

document.getElementById('lang-pill').addEventListener('click',e=>{
  if(!e.target.matches('.bc-btn'))return;
  document.querySelectorAll('#lang-pill .bc-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  state.lang=e.target.dataset.lang;
  init();
});

document.getElementById('time-pill').addEventListener('click',e=>{
  if(!e.target.matches('.bc-btn'))return;
  document.querySelectorAll('#time-pill .bc-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  state.seconds=parseInt(e.target.dataset.sec);
  init();
});

try{const s=localStorage.getItem('gs_rec');if(s)state.bestRecords=JSON.parse(s);}catch(e){}

init();
</script>
</body>
</html>
